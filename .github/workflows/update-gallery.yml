name: Update Gallery Manifest

on:
  push:
    paths:
      - 'gallery/**'

  # Allow running manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-gallery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate gallery-data.js
        run: |
          echo "Scanning gallery/ folder for media files..."

          # Find all image and video files in the gallery folder
          FILES=$(find gallery/ -type f \( \
            -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o \
            -iname "*.gif" -o -iname "*.webp" -o -iname "*.svg" -o \
            -iname "*.mp4" -o -iname "*.webm" -o -iname "*.mov" \
          \) | sort)

          # Start building the JS file
          cat > gallery-data.js << 'HEADER'
          /* Gallery Data — Auto-generated by GitHub Actions */
          /* DO NOT EDIT — this file is regenerated on every push to gallery/ */
          const GALLERY_DATA = [
          HEADER

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' gallery-data.js

          FIRST=true
          for FILE in $FILES; do
            # Get the filename without path and extension for the title
            BASENAME=$(basename "$FILE")
            FILENAME="${BASENAME%.*}"
            EXTENSION="${BASENAME##*.}"
            EXTENSION_LOWER=$(echo "$EXTENSION" | tr '[:upper:]' '[:lower:]')

            # Determine media type
            case "$EXTENSION_LOWER" in
              mp4|webm|mov)
                TYPE="video"
                ;;
              *)
                TYPE="image"
                ;;
            esac

            # Convert filename to human-readable title:
            # Replace hyphens and underscores with spaces, then capitalize each word
            TITLE=$(echo "$FILENAME" | sed 's/[-_]/ /g' | sed 's/\b\(.\)/\u\1/g')

            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              echo "," >> gallery-data.js
            fi

            printf '  {"file": "%s", "title": "%s", "type": "%s"}' "$FILE" "$TITLE" "$TYPE" >> gallery-data.js
          done

          echo "" >> gallery-data.js
          echo "];" >> gallery-data.js

          FILE_COUNT=$(echo "$FILES" | grep -c . || echo "0")
          echo "Generated gallery-data.js with $FILE_COUNT entries"
          cat gallery-data.js

      - name: Commit and push gallery-data.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gallery-data.js
          git diff --cached --quiet || git commit -m "Auto-update gallery-data.js [skip ci]"
          git push
